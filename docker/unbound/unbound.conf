# Recursive Unbound resolver for the adguardctl test stack.
# Mirrors the hardened server: block from this repo's install.sh, adapted for a
# container: listens on 0.0.0.0:5335 and only the compose network + localhost may
# query it. AdGuard Home (172.28.0.x) forwards to this at 172.28.0.53:5335.
server:
    # ── Listening ────────────────────────────────────────────────
    interface: 0.0.0.0
    port: 5335
    # Run as the container's user (root); localhost/compose-only exposure.
    username: ""

    # ── Protocols ────────────────────────────────────────────────
    do-ip4: yes
    do-ip6: no          # compose bridge has no IPv6 egress by default
    do-udp: yes
    do-tcp: yes

    # ── Security / Hardening ─────────────────────────────────────
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes
    use-caps-for-id: yes

    # ── DNSSEC ───────────────────────────────────────────────────
    val-clean-additional: yes
    root-hints: "/etc/unbound/root.hints"
    auto-trust-anchor-file: "/etc/unbound/root.key"

    # ── Privacy ──────────────────────────────────────────────────
    qname-minimisation: yes
    qname-minimisation-strict: no

    # ── Performance (modest; this is a test sidecar) ─────────────
    num-threads: 2
    msg-cache-size: 64m
    rrset-cache-size: 128m
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 86400

    # ── Access Control ───────────────────────────────────────────
    access-control: 127.0.0.0/8 allow
    access-control: 172.28.0.0/24 allow
    access-control: 0.0.0.0/0 refuse
    access-control: ::/0 refuse

    # ── Logging (minimal) ────────────────────────────────────────
    verbosity: 0
    log-queries: no
    log-replies: no
    log-servfail: yes
